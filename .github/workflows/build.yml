name: Build Android & iOS (Sideload)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_name:
        description: "Version name (e.g. 1.2.0)"
        required: false
      build_number:
        description: "Build number (e.g. 42)"
        required: false

env:
  FLUTTER_VERSION: "3.41.5"

jobs:
  # ─── Android APK ──────────────────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Decode Android keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-keystore.jks

      - name: Create key.properties
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF

      - name: Resolve version args
        id: version
        run: |
          ARGS=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            [[ -n "${{ inputs.build_name }}" ]] && ARGS="$ARGS --build-name=${{ inputs.build_name }}"
            [[ -n "${{ inputs.build_number }}" ]] && ARGS="$ARGS --build-number=${{ inputs.build_number }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            ARGS="--build-name=$VERSION"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Build APK (release)
        run: flutter build apk --release ${{ steps.version.outputs.args }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shoppermost-android
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  # ─── iOS IPA (ad-hoc / sideload) ─────────────────────────────
  ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Import signing certificate
        if: env.IOS_CERTIFICATE_P12_BASE64 != ''
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Install provisioning profile
        if: env.IOS_PROVISIONING_PROFILE_BASE64 != ''
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID.mobileprovision"

      - name: Resolve version args
        id: version
        run: |
          ARGS=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            [[ -n "${{ inputs.build_name }}" ]] && ARGS="$ARGS --build-name=${{ inputs.build_name }}"
            [[ -n "${{ inputs.build_number }}" ]] && ARGS="$ARGS --build-number=${{ inputs.build_number }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            ARGS="--build-name=$VERSION"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Build iOS (no codesign — for local re-signing)
        if: env.IOS_CERTIFICATE_P12_BASE64 == ''
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
        run: |
          flutter build ios --release --no-codesign ${{ steps.version.outputs.args }}
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa && zip -r ../shoppermost.ipa Payload

      - name: Build IPA (signed — ad-hoc)
        if: env.IOS_CERTIFICATE_P12_BASE64 != ''
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            ${{ steps.version.outputs.args }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: shoppermost-ios
          path: |
            build/ios/ipa/*.ipa
            build/ios/shoppermost.ipa
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          if [[ -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
